<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --accent: {{ACCENT_COLOR}};
    --accent-light: {{ACCENT_LIGHT}};
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f9fafb;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 2rem 1rem;
  }
  .container { max-width: 900px; margin: 0 auto; }

  /* ヘッダー */
  .header {
    background: var(--accent);
    color: white;
    border-radius: 12px;
    padding: 2rem 2.5rem;
    margin-bottom: 1.5rem;
  }
  .header .badge {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    padding: 0.2rem 0.8rem;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 0.6rem;
  }
  .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
  .header .meta { font-size: 0.85rem; opacity: 0.8; }

  /* サマリーカード */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    border-radius: 8px;
    padding: 1rem 1.2rem;
  }
  .summary-card .label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .summary-card .value { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-top: 0.2rem; }
  .summary-card .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.1rem; }

  /* セクション */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 1.2rem;
    overflow: hidden;
  }
  .section-header {
    background: var(--accent-light);
    padding: 0.8rem 1.5rem;
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-body { padding: 1.2rem 1.5rem; }

  /* テーブル */
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th { background: var(--accent-light); color: var(--accent); font-weight: 600; padding: 0.6rem 0.8rem; text-align: left; }
  td { padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  /* バッジ類 */
  .tag {
    display: inline-block;
    border-radius: 4px;
    padding: 0.1rem 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    margin: 0.1rem;
  }
  .tag-red    { background: #fee2e2; color: #b91c1c; }
  .tag-yellow { background: #fef9c3; color: #92400e; }
  .tag-green  { background: #dcfce7; color: #15803d; }
  .tag-blue   { background: #dbeafe; color: #1d4ed8; }
  .tag-gray   { background: #f3f4f6; color: #374151; }

  /* コードブロック */
  pre {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 6px;
    padding: 1rem;
    overflow-x: auto;
    font-size: 0.85rem;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    margin: 0.5rem 0;
  }
  code { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 0.88em; }
  p code, li code {
    background: var(--accent-light);
    color: var(--accent);
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
  }

  /* リスト */
  ul, ol { padding-left: 1.4rem; }
  li { margin-bottom: 0.3rem; }

  /* フッター */
  .footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  /* コンテンツ本文（{{CONTENT}}展開先） */
  .content p  { margin-bottom: 0.8rem; }
  .content h2 { font-size: 1.1rem; font-weight: 700; margin: 1.2rem 0 0.5rem; color: var(--accent); }
  .content h3 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.4rem; }
  .content ul, .content ol { margin-bottom: 0.8rem; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">{{BADGE_LABEL}}</div>
    <h1>{{TITLE}}</h1>
    <div class="meta">{{SUBTITLE}} &nbsp;|&nbsp; 作成: {{DATE}} &nbsp;|&nbsp; ID: {{DOC_ID}}</div>
  </div>

  {{SUMMARY_CARDS}}

  {{MAIN_CONTENT}}

  <div class="footer">
    Generated by Claude Code &mdash; {{DATE}}
  </div>
</div>
</body>
</html>
